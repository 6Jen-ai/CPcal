<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#151518" />
  <meta name="description" content="CP Cal — Compare cost-per-volume and find the best deal." />
  <title>CP Cal</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- iOS Home Screen -->
  <link rel="apple-touch-icon"              href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon"              href="favicon.png" />
  <meta name="apple-mobile-web-app-title" content="CP Cal" />

  <!-- Android PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Comfortable dark — warm charcoal, not void black */
      --bg:         #151518;
      --surface:    #1e1e23;
      --surface2:   #26262d;
      --surface3:   #2f2f38;
      --border:     rgba(255,255,255,.08);
      --border-mid: rgba(255,255,255,.12);

      /* Accent — soft indigo, not electric */
      --accent:     #8b7cf6;
      --accent-sub: rgba(139,124,246,.15);

      /* Best deal — warm teal */
      --best:       #34d399;
      --best-sub:   rgba(52,211,153,.12);
      --best-border:rgba(52,211,153,.35);

      /* Danger */
      --danger:     #f87171;
      --danger-sub: rgba(248,113,113,.10);

      /* Convert accent — soft amber */
      --convert:     #fbbf24;
      --convert-sub: rgba(251,191,36,.10);
      --convert-border: rgba(251,191,36,.30);

      /* Text */
      --text-h:   #e8e8ee;
      --text-b:   #9898a8;
      --text-m:   #55555f;

      /* Shadows — soft, depth without glow */
      --shadow-card: 0 2px 4px rgba(0,0,0,.25),
                     0 8px 24px rgba(0,0,0,.35);
      --shadow-btn:  0 2px 8px rgba(0,0,0,.35);
      --shadow-best: 0 0 0 1.5px var(--best-border),
                     0 4px 20px rgba(52,211,153,.10);

      --radius:    16px;
      --radius-sm: 10px;
      --radius-xs: 8px;
      --ease:      .18s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-b);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      line-height: 1.5;
    }

    /* ── App Shell ────────────────────────────────────────── */
    .app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 60px;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      width: 100%;
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: linear-gradient(140deg, #6d5bdf 0%, #9b8afb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(109,91,223,.35);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-h);
      letter-spacing: -.035em;
      line-height: 1;
    }

    header p {
      font-size: .78rem;
      color: var(--text-m);
      letter-spacing: .015em;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      width: 100%;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      padding: 20px 16px 18px;
    }

    /* ── Column Labels ────────────────────────────────────── */
    .col-labels {
      display: grid;
      grid-template-columns: 32px 1.1fr 1.1fr 1.1fr 36px;
      gap: 6px;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .col-labels span {
      font-size: .62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-m);
    }

    .col-labels .col-convert {
      color: var(--convert);
      opacity: .7;
    }

    /* ── Rows ─────────────────────────────────────────────── */
    #items-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 11px 9px;
      transition: box-shadow var(--ease), border-color var(--ease), transform var(--ease);
    }

    .item-row.is-best {
      border-color: var(--best-border);
      box-shadow: var(--shadow-best);
      transform: translateY(-1px);
    }

    .row-inputs {
      display: grid;
      grid-template-columns: 32px 1.1fr 1.1fr 1.1fr 36px;
      gap: 6px;
      align-items: center;
    }

    /* ── Item number badge ────────────────────────────────── */
    .item-num {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--surface3);
      border: 1px solid var(--border);
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-m);
      letter-spacing: .01em;
      flex-shrink: 0;
      transition: background var(--ease), border-color var(--ease), color var(--ease);
    }

    .item-row.is-best .item-num {
      background: var(--best-sub);
      border-color: var(--best-border);
      color: var(--best);
    }

    /* ── Inputs ───────────────────────────────────────────── */
    input[type="number"] {
      width: 100%;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 8px 9px;
      font-size: .88rem;
      font-family: inherit;
      color: var(--text-h);
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      touch-action: manipulation;
      transition: border-color var(--ease), box-shadow var(--ease);
      -moz-appearance: textfield;
      appearance: textfield;
      caret-color: var(--accent);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input:focus {
      border-color: rgba(139,124,246,.40);
      box-shadow: 0 0 0 2.5px var(--accent-sub);
    }

    input::placeholder { color: var(--text-m); opacity: .8; }

    /* Convert field — styled differently to show it's optional */
    .inp-convert {
      border-style: dashed !important;
      border-color: var(--convert-border) !important;
      background: rgba(251,191,36,.04) !important;
      caret-color: var(--convert) !important;
      color: var(--convert) !important;
    }

    .inp-convert:focus {
      border-style: solid !important;
      border-color: var(--convert) !important;
      box-shadow: 0 0 0 2.5px var(--convert-sub) !important;
    }

    .inp-convert::placeholder { color: var(--convert); opacity: .35; }

    /* When convert field has a value, dim the volume field to show it won't be used */
    .vol-dim {
      opacity: .4;
    }

    /* ── Remove button ────────────────────────────────────── */
    .btn-remove {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-m);
      font-size: .95rem;
      transition: background var(--ease), border-color var(--ease), color var(--ease);
      touch-action: manipulation;
      flex-shrink: 0;
    }

    .btn-remove:hover, .btn-remove:active {
      background: var(--danger-sub);
      border-color: rgba(248,113,113,.25);
      color: var(--danger);
    }

    .btn-remove:disabled { opacity: .2; pointer-events: none; }

    /* ── Result area ──────────────────────────────────────── */
    .result-area {
      margin-top: 8px;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-badge {
      display: none;
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      background: var(--surface3);
      border: 1px solid var(--border-mid);
      color: var(--text-b);
      font-variant-numeric: tabular-nums;
    }

    .result-badge.visible { display: inline-block; }

    .item-row.is-best .result-badge {
      background: var(--best-sub);
      border-color: var(--best-border);
      color: var(--best);
      font-weight: 700;
    }

    .best-label {
      display: none;
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--best);
    }

    .item-row.is-best .best-label { display: inline; }

    /* ── Hint row (convert column hint) ───────────────────── */
    .col-hint {
      margin-top: 4px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .64rem;
      color: var(--convert);
      opacity: .55;
      letter-spacing: .01em;
    }

    .col-hint svg { flex-shrink: 0; }

    /* ── Divider ──────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      padding: 14px 20px;
      width: 100%;
      touch-action: manipulation;
      transition: opacity var(--ease), box-shadow var(--ease), transform var(--ease);
      letter-spacing: .01em;
    }

    .btn:active { transform: scale(.97); }

    .btn-add {
      background: var(--surface2);
      color: var(--accent);
      border: 1px dashed rgba(139,124,246,.28);
      font-size: .86rem;
    }

    .btn-add:hover {
      border-style: solid;
      border-color: rgba(139,124,246,.45);
      background: var(--surface3);
    }

    .btn-add:disabled { opacity: .35; pointer-events: none; }

    .btn-calc {
      background: linear-gradient(135deg, #6d5bdf 0%, #9b8afb 100%);
      color: #fff;
      box-shadow: var(--shadow-btn);
    }

    .btn-calc:hover { opacity: .92; box-shadow: 0 4px 16px rgba(109,91,223,.35); }

    .btn-reset {
      background: none;
      color: var(--text-m);
      font-size: .76rem;
      font-weight: 600;
      padding: 8px;
      border: none;
      box-shadow: none;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .btn-reset:hover { color: var(--danger); }

    /* ── Summary panel ────────────────────────────────────── */
    .summary-panel {
      margin-top: 14px;
      padding: 14px 15px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--best-border);
      display: none;
      flex-direction: column;
      gap: 7px;
    }

    .summary-panel.visible { display: flex; }

    .summary-title {
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--best);
      margin-bottom: 1px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: .8rem;
    }

    .summary-row .lbl { color: var(--text-m); font-weight: 500; }
    .summary-row .val { color: var(--text-h); font-weight: 700; font-variant-numeric: tabular-nums; }
    .summary-row .val.hi { color: var(--best); font-size: .88rem; }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(max(24px, env(safe-area-inset-bottom, 0px)) + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface3);
      border: 1px solid var(--border-mid);
      color: var(--text-h);
      padding: 9px 18px;
      border-radius: 40px;
      font-size: .78rem;
      font-weight: 600;
      font-family: inherit;
      pointer-events: none;
      transition: transform .28s cubic-bezier(.34,1.4,.64,1), opacity .22s;
      opacity: 0;
      white-space: nowrap;
      z-index: 999;
      box-shadow: var(--shadow-card);
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      margin-top: 32px;
      font-size: .66rem;
      color: var(--text-m);
      opacity: .5;
      text-align: center;
      letter-spacing: .04em;
    }

    @media (max-width: 380px) {
      .app { padding: 24px 10px 52px; }
      .card { padding: 16px 11px 15px; }
      header h1 { font-size: 1.55rem; }
      .col-labels { grid-template-columns: 28px 1fr 1fr 1fr 30px; gap: 4px; }
      .row-inputs  { grid-template-columns: 28px 1fr 1fr 1fr 30px; gap: 4px; }
      .item-num { width: 28px; height: 28px; font-size: .66rem; }
      .btn-remove { width: 30px; height: 30px; font-size: .85rem; }
    }
  </style>
</head>
<body>

<div class="app">

  <header>
    <div class="logo-row">
      <div class="logo-icon">🛒</div>
      <h1>CP Cal</h1>
    </div>
    <p>Compare cost per volume · find the best deal</p>
  </header>

  <div class="card">

    <!-- Column labels -->
    <div class="col-labels">
      <span></span>
      <span>Price ($)</span>
      <span>Volume</span>
      <span class="col-convert">→ ml <em style="font-style:normal;opacity:.6">(opt)</em></span>
      <span></span>
    </div>

    <!-- Rows -->
    <div id="items-container"></div>

    <!-- Hint below grid -->
    <div class="col-hint">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 7v5M8 5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Fill "→ ml" only when units differ (e.g. 5.3 L → 5300). Leave blank if volume is already in ml.
    </div>

    <div class="divider"></div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-add" id="btn-add">＋ Add Item</button>
      <button class="btn btn-calc" id="btn-calc">⚡ Calculate Best Deal</button>
      <button class="btn btn-reset" id="btn-reset">Reset All</button>
    </div>

    <!-- Summary -->
    <div class="summary-panel" id="summary-panel">
      <div class="summary-title">🏆 Best Deal Summary</div>
      <div class="summary-row">
        <span class="lbl">Winner</span>
        <span class="val hi" id="s-name">—</span>
      </div>
      <div class="summary-row">
        <span class="lbl">Cost per ml</span>
        <span class="val" id="s-cpu">—</span>
      </div>
      <div class="summary-row">
        <span class="lbl">Savings vs worst</span>
        <span class="val" id="s-save">—</span>
      </div>
    </div>

  </div>

  <footer>CP Cal · Antigravity Dark Minimalist</footer>
</div>

<div class="toast" id="toast"></div>

<script>
  'use strict';

  const MAX_ROWS     = 10;
  const MIN_ROWS     = 2;
  const INITIAL_ROWS = 3;

  const container    = document.getElementById('items-container');
  const btnAdd       = document.getElementById('btn-add');
  const btnCalc      = document.getElementById('btn-calc');
  const btnReset     = document.getElementById('btn-reset');
  const toast        = document.getElementById('toast');
  const summaryPanel = document.getElementById('summary-panel');
  const sName        = document.getElementById('s-name');
  const sCpu         = document.getElementById('s-cpu');
  const sSave        = document.getElementById('s-save');

  let rowCount = 0;

  /* Toast */
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
  }

  /* Dim/undim vol field based on whether convert field is filled */
  function syncVolDim(row) {
    const inpVol     = row.querySelector('.inp-meas');
    const inpConvert = row.querySelector('.inp-convert');
    const hasConvert = inpConvert.value.trim() !== '';
    inpVol.classList.toggle('vol-dim', hasConvert);
  }

  /* Create row */
  function createRow(idx) {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.dataset.id = idx;
    div.innerHTML = `
      <div class="row-inputs">
        <div class="item-num">${idx}</div>
        <input type="number" class="inp-price" inputmode="decimal"
               placeholder="0.00" min="0" step="any" />
        <input type="number" class="inp-meas"  inputmode="decimal"
               placeholder="ml / L / …" min="0" step="any" />
        <input type="number" class="inp-convert" inputmode="decimal"
               placeholder="in ml" min="0" step="any" title="Optional: enter the volume converted to ml" />
        <button class="btn-remove" title="Remove" aria-label="Remove row">✕</button>
      </div>
      <div class="result-area">
        <span class="result-badge"></span>
        <span class="best-label">✦ Best</span>
      </div>`;

    div.querySelector('.btn-remove').addEventListener('click', () => removeRow(div));

    /* When convert field changes, dim/undim the vol field */
    div.querySelector('.inp-convert').addEventListener('input', () => {
      syncVolDim(div);
      clearResults();
    });

    container.appendChild(div);
    rowCount++;
    updateUI();
    return div;
  }

  /* Remove row */
  function removeRow(div) {
    if (rowCount <= MIN_ROWS) { showToast(`Keep at least ${MIN_ROWS} rows.`); return; }
    div.style.cssText += 'opacity:0;transform:scale(.96);transition:opacity .16s,transform .16s';
    setTimeout(() => { div.remove(); rowCount--; updateUI(); clearResults(); }, 160);
  }

  /* Sync UI state */
  function updateUI() {
    const atMax = rowCount >= MAX_ROWS;
    btnAdd.disabled    = atMax;
    btnAdd.textContent = atMax ? '✗  Max 10 items' : `＋ Add Item  (${rowCount}/${MAX_ROWS})`;
    const canRemove = rowCount > MIN_ROWS;
    container.querySelectorAll('.btn-remove').forEach(b => b.disabled = !canRemove);
  }

  /* Clear results */
  function clearResults() {
    container.querySelectorAll('.item-row').forEach(row => {
      row.classList.remove('is-best');
      const b = row.querySelector('.result-badge');
      b.classList.remove('visible');
      b.textContent = '';
    });
    summaryPanel.classList.remove('visible');
  }

  /* Get effective volume in ml for a row.
     Priority: inp-convert (if filled) → inp-meas (raw value, assumed ml) */
  function effectiveVolume(row) {
    const convertVal = parseFloat(row.querySelector('.inp-convert').value);
    if (Number.isFinite(convertVal) && convertVal > 0) return convertVal;
    const measVal = parseFloat(row.querySelector('.inp-meas').value);
    if (Number.isFinite(measVal) && measVal > 0) return measVal;
    return null;
  }

  /* Calculate */
  function calculate() {
    clearResults();
    const rows    = Array.from(container.querySelectorAll('.item-row'));
    const results = [];

    rows.forEach((row, i) => {
      const price  = parseFloat(row.querySelector('.inp-price').value);
      const vol    = effectiveVolume(row);
      if (!Number.isFinite(price) || price <= 0 || vol === null) return;
      const cpu    = price / vol;
      const label  = `Item ${row.querySelector('.item-num').textContent}`;
      results.push({ row, cpu, label });
    });

    if (results.length < 2) { showToast('Fill in at least 2 rows to compare.'); return; }

    const minCPU = Math.min(...results.map(r => r.cpu));
    const maxCPU = Math.max(...results.map(r => r.cpu));

    results.forEach(({ row, cpu }) => {
      const badge = row.querySelector('.result-badge');
      badge.textContent = `$${cpu.toFixed(4)}/ml`;
      badge.classList.add('visible');
      if (cpu === minCPU) row.classList.add('is-best');
    });

    const winner  = results.find(r => r.cpu === minCPU);
    const savings = maxCPU > 0
      ? `${(((maxCPU - minCPU) / maxCPU) * 100).toFixed(1)}% cheaper`
      : '—';

    sName.textContent = winner.label;
    sCpu.textContent  = `$${minCPU.toFixed(4)} / ml`;
    sSave.textContent = savings;
    summaryPanel.classList.add('visible');

    const bestEl = container.querySelector('.item-row.is-best');
    if (bestEl) bestEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    showToast('✦ Best deal found!');
  }

  /* Reset */
  function reset() {
    container.innerHTML = '';
    rowCount = 0;
    for (let i = 1; i <= INITIAL_ROWS; i++) createRow(i);
    clearResults();
    updateUI();
  }

  /* Events */
  btnAdd.addEventListener('click', () => {
    if (rowCount >= MAX_ROWS) return;
    const row = createRow(rowCount + 1);
    row.style.cssText += 'opacity:0;transform:translateY(8px)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      row.style.cssText += 'opacity:1;transform:translateY(0);transition:opacity .2s,transform .2s';
    }));
    clearResults();
  });

  btnCalc.addEventListener('click', calculate);
  btnReset.addEventListener('click', reset);

  /* Clear results on any input change (except convert which handles its own) */
  container.addEventListener('input', e => {
    if (!e.target.classList.contains('inp-convert')) clearResults();
  });

  /* Enter → next field */
  container.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const inputs = [...document.querySelectorAll('.card input, .card button')];
    const i = inputs.indexOf(e.target);
    if (i !== -1 && i < inputs.length - 1) { inputs[i + 1].focus(); e.preventDefault(); }
  });

  reset();
</script>

</body>
</html>
